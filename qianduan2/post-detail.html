<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>帖子详情 · 东海校园论坛</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #F5F7FA; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif; padding-bottom: 80px; }
        .container { max-width: 800px; margin: 0 auto; padding: 20px 16px; }
        .back-btn { background: white; border: 1px solid #E5E7EB; width: 40px; height: 40px; border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; cursor: pointer; margin-bottom: 20px; }
        .post-card { background: white; border-radius: 28px; padding: 24px; margin-bottom: 24px; border: 1px solid #E5E7EB; }
        .post-header { display: flex; align-items: center; gap: 14px; margin-bottom: 16px; }
        .post-avatar { width: 52px; height: 52px; border-radius: 50%; object-fit: cover; }
        .post-name { font-weight: 600; font-size: 1rem; }
        .post-meta { font-size: 0.7rem; color: #9CA3AF; margin-top: 4px; }
        .post-title { font-size: 1.2rem; font-weight: 600; margin: 12px 0; }
        .post-content { font-size: 0.95rem; color: #4B5563; margin-bottom: 16px; line-height: 1.5; }
        .post-image img { max-width: 100%; max-height: 400px; border-radius: 20px; margin-bottom: 16px; cursor: pointer; }
        .like-btn { background: none; border: none; display: inline-flex; align-items: center; gap: 6px; font-size: 0.9rem; color: #6B7280; cursor: pointer; padding: 6px 12px; border-radius: 30px; }
        .like-btn.liked { color: #3B82F6; }
        .like-icon { width: 20px; height: 20px; vertical-align: middle; }
        .comments-header { font-weight: 600; margin: 20px 0 16px; padding-bottom: 6px; border-bottom: 2px solid #3B82F6; display: inline-block; }
        .comment-item { margin-bottom: 16px; }
        .comment-card { background: white; border-radius: 20px; padding: 16px; border: 1px solid #E5E7EB; }
        .comment-header { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
        .comment-avatar { width: 36px; height: 36px; border-radius: 50%; object-fit: cover; }
        .comment-author { font-weight: 600; font-size: 0.85rem; }
        .comment-time { font-size: 0.65rem; color: #9CA3AF; margin-left: auto; }
        .comment-content { font-size: 0.85rem; color: #4B5563; margin: 8px 0; word-break: break-word; }
        .comment-actions { display: flex; gap: 16px; margin-top: 8px; }
        .comment-like, .comment-reply { background: none; border: none; font-size: 0.7rem; color: #6B7280; cursor: pointer; display: inline-flex; align-items: center; gap: 4px; }
        .comment-like.liked { color: #3B82F6; }
        .reply-input-area { margin-top: 12px; margin-left: 46px; display: none; }
        .reply-input-area input { width: calc(100% - 80px); padding: 6px 12px; border: 1px solid #E5E7EB; border-radius: 30px; font-size: 0.8rem; }
        .reply-input-area button { background: #3B82F6; color: white; border: none; padding: 6px 16px; border-radius: 30px; cursor: pointer; font-size: 0.7rem; margin-left: 8px; }
        .replies { margin-left: 46px; margin-top: 12px; }
        .reply-item { background: #F9FAFB; border-radius: 16px; padding: 12px; margin-bottom: 10px; border-left: 2px solid #3B82F6; }
        .reply-header { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
        .reply-avatar { width: 28px; height: 28px; border-radius: 50%; object-fit: cover; }
        .reply-author { font-weight: 600; font-size: 0.75rem; }
        .reply-time { font-size: 0.6rem; color: #9CA3AF; margin-left: auto; }
        .reply-content { font-size: 0.8rem; color: #4B5563; margin: 4px 0 0 36px; }
        .reply-actions { margin-left: 36px; margin-top: 6px; display: flex; gap: 12px; }
        .reply-like { background: none; border: none; font-size: 0.65rem; color: #6B7280; cursor: pointer; display: inline-flex; align-items: center; gap: 4px; }
        .input-area { position: fixed; bottom: 0; left: 0; right: 0; background: white; border-top: 1px solid #E5E7EB; padding: 12px 16px; display: flex; gap: 12px; max-width: 800px; margin: 0 auto; left: 50%; transform: translateX(-50%); width: 100%; }
        .input-area input { flex: 1; padding: 10px 16px; border: 1px solid #E5E7EB; border-radius: 40px; outline: none; }
        .input-area button { background: #3B82F6; color: white; border: none; padding: 0 20px; border-radius: 40px; cursor: pointer; }
        .delete-btn, .report-btn { background: none; border: none; font-size: 0.7rem; cursor: pointer; margin-left: 12px; }
        .delete-btn { color: #EF4444; }
        .report-btn { color: #F59E0B; }
        .modal { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); justify-content: center; align-items: center; z-index: 1000; }
        .modal.active { display: flex; }
        .modal-content { background: white; border-radius: 32px; width: 90%; max-width: 460px; padding: 24px; }
        .modal-content textarea { width: 100%; padding: 10px; margin: 12px 0; border-radius: 20px; border: 1px solid #E5E7EB; }
        .modal-buttons { display: flex; gap: 12px; justify-content: flex-end; }
        .like-icon-small { width: 14px; height: 14px; vertical-align: middle; margin-right: 2px; }
    </style>
</head>
<body>
<div class="container">
    <button class="back-btn" onclick="location.href='index.html'">←</button>
    <div id="postContainer"></div>
    <div id="commentsContainer"></div>
</div>
<div class="input-area">
    <input type="text" id="commentInput" placeholder="写评论...">
    <button onclick="submitComment()">发送</button>
</div>

<div id="reportModal" class="modal">
    <div class="modal-content">
        <h3>举报</h3>
        <textarea id="reportReason" rows="3" placeholder="请说明举报原因..."></textarea>
        <div class="modal-buttons"><button class="btn-cancel" id="closeReportModal">取消</button><button class="btn-submit" id="submitReportBtn">提交</button></div>
    </div>
</div>

<script>
    const API_BASE = 'http://localhost:5000/api';
    const STATIC_BASE = 'http://localhost:5000';
    let currentUserId = null;
    let currentUser = null;
    let currentPost = null;
    let currentComments = [];
    let reportTargetId = null;

    async function apiRequest(url, options = {}) {
        const headers = { 'Content-Type': 'application/json', ...options.headers };
        if (currentUserId) headers['X-User-Id'] = currentUserId;
        const res = await fetch(API_BASE + url, { ...options, headers });
        if (!res.ok) throw new Error(await res.text());
        return res.json();
    }

    function getAvatarUrl(avatar) {
        if (!avatar) return 'data:image/svg+xml,%3Csvg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="%233B82F6"%3E%3Cpath d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/%3E%3C/svg%3E';
        if (avatar.startsWith('data:image') || avatar.startsWith('http')) return avatar;
        if (avatar.startsWith('/uploads/')) return STATIC_BASE + avatar;
        return STATIC_BASE + '/uploads/' + avatar;
    }

    function escapeHtml(s) { if(!s) return ""; return s.replace(/[&<>]/g, m => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;' }[m])); }
    function formatDateTime(iso) { if (!iso) return ""; const d = new Date(iso); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`; }

    async function checkLogin() {
        const userId = localStorage.getItem('userId');
        if (!userId) { window.location.href = 'login.html'; return false; }
        currentUserId = parseInt(userId);
        const userStr = localStorage.getItem('user');
        if (userStr) currentUser = JSON.parse(userStr);
        return true;
    }

    async function loadPost() {
        const params = new URLSearchParams(location.search);
        const id = params.get('id');
        if (!id) { alert('参数错误'); location.href='index.html'; return; }
        const posts = await apiRequest('/posts');
        currentPost = posts.find(p => p.id == id);
        if (!currentPost) { document.getElementById('postContainer').innerHTML = '<div>帖子不存在</div>'; return; }
        renderPost();
        await loadComments();
    }

    function renderPost() {
        const isAuthor = currentPost.user_id === currentUserId;
        const liked = currentPost.likedBy && currentPost.likedBy.includes(currentUserId);
        const avatarSrc = getAvatarUrl(currentPost.avatar);
        let imageHtml = '';
        if (currentPost.image_url) {
            let imgUrl = currentPost.image_url;
            if (!imgUrl.startsWith('http') && !imgUrl.startsWith('data:image')) imgUrl = STATIC_BASE + (imgUrl.startsWith('/')?imgUrl:'/'+imgUrl);
            imageHtml = `<div class="post-image"><img src="${imgUrl}" onclick="window.open(this.src)"></div>`;
        }
        let html = `
            <div class="post-card">
                <div class="post-header">
                    <img class="post-avatar" src="${avatarSrc}">
                    <div class="post-info">
                        <div class="post-name">${escapeHtml(currentPost.username)}</div>
                        <div class="post-meta">${formatDateTime(currentPost.created_at)}</div>
                    </div>
                </div>
                <div class="post-title">${escapeHtml(currentPost.title)}</div>
                <div class="post-content">${escapeHtml(currentPost.content)}</div>
                ${imageHtml}
                <button class="like-btn ${liked ? 'liked' : ''}" onclick="togglePostLike(this)">
                    <img src="images/dianzan.png" class="like-icon" alt="点赞">
                    <span>${currentPost.likeCount || 0}</span>
                </button>
                ${isAuthor ? `<button class="delete-btn" onclick="deletePost()" style="margin-left:12px;">删除帖子</button>` : ''}
            </div>
        `;
        document.getElementById('postContainer').innerHTML = html;
    }

    async function togglePostLike(btn) {
        try {
            const res = await apiRequest(`/posts/${currentPost.id}/like`, { method: 'POST' });
            btn.classList.toggle('liked', res.liked);
            btn.querySelector('span').innerText = res.likeCount;
        } catch(e) { alert('操作失败'); }
    }

    async function deletePost() {
        if (confirm('确定删除这条帖子？')) {
            await apiRequest(`/posts/${currentPost.id}`, { method: 'DELETE' });
            alert('已删除');
            location.href = 'index.html';
        }
    }

    async function loadComments() {
        const comments = await apiRequest(`/posts/${currentPost.id}/comments`);
        currentComments = comments;
        renderComments();
    }

    function renderComments() {
        const container = document.getElementById('commentsContainer');
        if (!currentComments.length) {
            container.innerHTML = '<div style="text-align:center;padding:32px;">✨ 暂无评论，抢沙发～</div>';
            return;
        }
        let html = '<div class="comments-header">📝 评论</div>';
        for (let comment of currentComments) {
            html += renderCommentCard(comment);
        }
        container.innerHTML = html;
        // 绑定回复按钮事件
        document.querySelectorAll('.reply-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const commentId = parseInt(btn.dataset.id);
                toggleReplyInput(commentId);
            });
        });
        // 绑定回复提交事件
        document.querySelectorAll('.submit-reply-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const commentId = parseInt(btn.dataset.id);
                submitReply(commentId);
            });
        });
        // 绑定取消回复事件
        document.querySelectorAll('.cancel-reply-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const commentId = parseInt(btn.dataset.id);
                hideReplyInput(commentId);
            });
        });
    }

    function renderCommentCard(comment) {
        const isAuthor = comment.user_id === currentUserId;
        const liked = comment.likedBy && comment.likedBy.includes(currentUserId);
        const avatarSrc = getAvatarUrl(comment.avatar);
        let repliesHtml = '';
        if (comment.replies && comment.replies.length) {
            repliesHtml = '<div class="replies">';
            for (let reply of comment.replies) {
                const isReplyAuthor = reply.user_id === currentUserId;
                const replyLiked = reply.likedBy && reply.likedBy.includes(currentUserId);
                const replyAvatar = getAvatarUrl(reply.avatar);
                repliesHtml += `
                    <div class="reply-item">
                        <div class="reply-header">
                            <img class="reply-avatar" src="${replyAvatar}">
                            <span class="reply-author">${escapeHtml(reply.author)}</span>
                            <span class="reply-time">${formatDateTime(reply.created_at)}</span>
                            ${isReplyAuthor ? `<button class="delete-btn" onclick="deleteComment(${reply.id})">删除</button>` : ''}
                        </div>
                        <div class="reply-content">${escapeHtml(reply.content)}</div>
                        <div class="reply-actions">
                            <button class="reply-like ${replyLiked ? 'liked' : ''}" onclick="toggleCommentLike(${reply.id}, this)">
                                <img src="images/dianzan.png" class="like-icon-small" alt="点赞"> <span>${reply.likeCount || 0}</span>
                            </button>
                        </div>
                    </div>
                `;
            }
            repliesHtml += '</div>';
        }
        return `
            <div class="comment-item" id="comment-${comment.id}">
                <div class="comment-card">
                    <div class="comment-header">
                        <img class="comment-avatar" src="${avatarSrc}">
                        <span class="comment-author">${escapeHtml(comment.author)}</span>
                        <span class="comment-time">${formatDateTime(comment.created_at)}</span>
                        ${isAuthor ? `<button class="delete-btn" onclick="deleteComment(${comment.id})">删除</button>` : `<button class="report-btn" onclick="openReportModal('comment', ${comment.id})">举报</button>`}
                    </div>
                    <div class="comment-content">${escapeHtml(comment.content)}</div>
                    <div class="comment-actions">
                        <button class="comment-like ${liked ? 'liked' : ''}" onclick="toggleCommentLike(${comment.id}, this)">
                            <img src="images/dianzan.png" class="like-icon-small" alt="点赞"> <span>${comment.likeCount || 0}</span>
                        </button>
                        <button class="comment-reply reply-btn" data-id="${comment.id}">💬 回复</button>
                    </div>
                    <div class="reply-input-area" id="reply-input-${comment.id}" style="display:none;">
                        <input type="text" id="reply-input-${comment.id}" placeholder="回复 ${escapeHtml(comment.author)}...">
                        <button class="submit-reply-btn" data-id="${comment.id}">发送</button>
                        <button class="cancel-reply-btn" data-id="${comment.id}" style="background:none; border:none; color:#9CA3AF;">取消</button>
                    </div>
                </div>
                ${repliesHtml}
            </div>
        `;
    }

    function toggleReplyInput(commentId) {
        const inputArea = document.getElementById(`reply-input-${commentId}`);
        if (inputArea.style.display === 'none') {
            inputArea.style.display = 'block';
        } else {
            inputArea.style.display = 'none';
        }
    }
    function hideReplyInput(commentId) {
        const inputArea = document.getElementById(`reply-input-${commentId}`);
        inputArea.style.display = 'none';
        const input = document.getElementById(`reply-input-${commentId}`);
        if (input) input.value = '';
    }
    async function submitReply(commentId) {
        const input = document.getElementById(`reply-input-${commentId}`);
        const content = input.value.trim();
        if (!content) { alert('请输入回复内容'); return; }
        try {
            await apiRequest(`/posts/${currentPost.id}/comments`, {
                method: 'POST',
                body: JSON.stringify({ content, parent_id: commentId })
            });
            hideReplyInput(commentId);
            await loadComments();
        } catch(e) { alert('回复失败'); }
    }

    async function toggleCommentLike(commentId, btn) {
        try {
            const res = await apiRequest(`/comments/${commentId}/like`, { method: 'POST' });
            // 更新按钮样式
            if (res.liked) btn.classList.add('liked');
            else btn.classList.remove('liked');
            const span = btn.querySelector('span');
            if (span) span.innerText = res.likeCount;
        } catch(e) { alert('操作失败'); }
    }

    async function deleteComment(commentId) {
        if (confirm('删除评论不可恢复，确定吗？')) {
            await apiRequest(`/comments/${commentId}`, { method: 'DELETE' });
            await loadComments();
        }
    }

    function openReportModal(type, targetId) {
        reportTargetId = targetId;
        document.getElementById('reportModal').classList.add('active');
    }
    document.getElementById('submitReportBtn').onclick = async () => {
        const reason = document.getElementById('reportReason').value.trim();
        if (!reason) { alert('请填写举报原因'); return; }
        await apiRequest('/report', { method: 'POST', body: JSON.stringify({ target_type: 'comment', target_id: reportTargetId, reason }) });
        alert('举报已提交');
        document.getElementById('reportModal').classList.remove('active');
        document.getElementById('reportReason').value = '';
    };
    document.getElementById('closeReportModal').onclick = () => document.getElementById('reportModal').classList.remove('active');

    async function submitComment() {
        const input = document.getElementById('commentInput');
        const content = input.value.trim();
        if (!content) { alert('请输入评论内容'); return; }
        await apiRequest(`/posts/${currentPost.id}/comments`, { method: 'POST', body: JSON.stringify({ content, parent_id: 0 }) });
        input.value = '';
        loadComments();
    }

    window.submitComment = submitComment;
    window.togglePostLike = togglePostLike;
    window.deletePost = deletePost;
    window.toggleCommentLike = toggleCommentLike;
    window.deleteComment = deleteComment;
    window.openReportModal = openReportModal;

    (async () => {
        if (await checkLogin()) {
            loadPost();
        }
    })();
</script>
</body>
</html>
