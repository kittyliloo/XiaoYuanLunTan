<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>编辑资料 · 东海校园论坛</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #F5F7FA; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif; padding: 20px; }
        .container { max-width: 500px; margin: 0 auto; background: white; border-radius: 32px; padding: 28px; box-shadow: 0 10px 25px -5px rgba(0,0,0,0.05); }
        h2 { font-size: 1.5rem; margin-bottom: 24px; }
        .avatar-section { text-align: center; margin-bottom: 24px; }
        .avatar-img { width: 80px; height: 80px; border-radius: 50%; object-fit: cover; margin-bottom: 8px; border: 2px solid #E5E7EB; }
        .upload-btn { background: #F3F4F6; border: none; padding: 6px 16px; border-radius: 40px; cursor: pointer; font-size: 0.8rem; }
        .field { margin-bottom: 20px; }
        label { display: block; font-size: 0.85rem; font-weight: 500; margin-bottom: 6px; }
        input, textarea { width: 100%; padding: 12px 16px; border: 1px solid #E5E7EB; border-radius: 28px; font-size: 0.9rem; outline: none; }
        textarea { resize: vertical; min-height: 80px; }
        .btn-save { background: #3B82F6; color: white; border: none; padding: 12px; border-radius: 40px; width: 100%; font-size: 1rem; cursor: pointer; margin-top: 8px; }
        .btn-back { background: #F3F4F6; color: #4B5563; border: none; padding: 12px; border-radius: 40px; width: 100%; cursor: pointer; margin-top: 12px; }
        .back-link { display: inline-block; margin-top: 16px; color: #3B82F6; text-decoration: none; }
    </style>
</head>
<body>
<div class="container">
    <h2>编辑资料</h2>
    <div class="avatar-section">
        <img id="avatarPreview" class="avatar-img" alt="头像">
        <label class="upload-btn" for="avatarInput">📷 上传头像</label>
        <input type="file" id="avatarInput" accept="image/*" style="display:none">
    </div>
    <div class="field">
        <label>昵称</label>
        <input type="text" id="nickname" placeholder="昵称">
    </div>
    <div class="field">
        <label>个人简介</label>
        <textarea id="bio" placeholder="写点什么吧..."></textarea>
    </div>
    <button class="btn-save" id="saveBtn">保存修改</button>
    <button class="btn-back" onclick="location.href='profile.html'">返回</button>
</div>
<script>
    const API_BASE = 'http://localhost:5000/api';
    let currentUser = null;
    let currentUserId = null;

    async function apiRequest(url, options = {}) {
        const headers = { 'Content-Type': 'application/json', ...options.headers };
        if (currentUserId) headers['X-User-Id'] = currentUserId;
        const res = await fetch(API_BASE + url, { ...options, headers });
        if (!res.ok) throw new Error(await res.text());
        return res.json();
    }

    async function loadUser() {
        const uid = localStorage.getItem('userId');
        const userStr = localStorage.getItem('user');
        if (!uid || !userStr) { location.href = 'login.html'; return; }
        currentUserId = parseInt(uid);
        currentUser = JSON.parse(userStr);
        document.getElementById('nickname').value = currentUser.nickname || currentUser.username;
        document.getElementById('bio').value = currentUser.bio || '';
        const avatarImg = document.getElementById('avatarPreview');
        if (currentUser.avatar) avatarImg.src = currentUser.avatar;
        else avatarImg.src = 'data:image/svg+xml,%3Csvg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="%233B82F6"%3E%3Cpath d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/%3E%3C/svg%3E';
    }

    document.getElementById('avatarInput').addEventListener('change', async (e) => {
        const file = e.target.files[0];
        if (file) {
            const formData = new FormData();
            formData.append('image', file);
            const res = await fetch(API_BASE + '/upload', { method: 'POST', headers: { 'X-User-Id': currentUserId }, body: formData });
            const data = await res.json();
            if (data.url) {
                document.getElementById('avatarPreview').src = data.url;
                // 保存到后端
                await apiRequest(`/user/${currentUserId}`, { method: 'PUT', body: JSON.stringify({ avatar: data.url }) });
                alert('头像已更新');
            }
        }
    });

    document.getElementById('saveBtn').onclick = async () => {
        const nickname = document.getElementById('nickname').value.trim();
        const bio = document.getElementById('bio').value;
        if (!nickname) { alert('昵称不能为空'); return; }
        await apiRequest(`/user/${currentUserId}`, { method: 'PUT', body: JSON.stringify({ nickname, bio }) });
        // 更新本地存储的用户信息
        currentUser.nickname = nickname;
        currentUser.bio = bio;
        localStorage.setItem('user', JSON.stringify(currentUser));
        alert('保存成功');
        location.href = 'profile.html';
    };

    loadUser();
</script>
</body>
</html>
