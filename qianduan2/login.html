<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>登录 · 东海校园论坛</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(145deg, #EFF6FF 0%, #DBEAFE 100%);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }
        .card {
            width: 100%;
            max-width: 420px;
            background: white;
            border-radius: 48px;
            padding: 40px 32px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.2);
        }
        .logo { text-align: center; font-size: 2rem; font-weight: 700; background: linear-gradient(135deg, #1E3A8A, #2563EB); -webkit-background-clip: text; background-clip: text; color: transparent; margin-bottom: 8px; }
        .sub { text-align: center; color: #6B7280; font-size: 0.9rem; margin-bottom: 32px; }
        .input-group { margin-bottom: 24px; }
        .input-label { font-size: 0.8rem; font-weight: 500; margin-bottom: 6px; display: block; }
        .input-field { width: 100%; padding: 14px 16px; background: #F9FAFB; border: 1px solid #E5E7EB; border-radius: 32px; font-size: 0.95rem; outline: none; }
        .input-field:focus { border-color: #3B82F6; background: white; box-shadow: 0 0 0 3px rgba(59,130,246,0.1); }
        .checkbox-group { display: flex; align-items: center; gap: 8px; margin: 16px 0; font-size: 0.8rem; }
        .checkbox-group a { color: #3B82F6; text-decoration: none; cursor: pointer; }
        .btn { width: 100%; padding: 14px; border: none; border-radius: 40px; font-size: 1rem; font-weight: 600; cursor: pointer; margin-top: 8px; }
        .btn-primary { background: #3B82F6; color: white; }
        .btn-outline { background: transparent; border: 1px solid #E5E7EB; color: #4B5563; margin-top: 12px; }
        .error-msg { background: #FEF2F2; color: #EF4444; padding: 12px; border-radius: 28px; font-size: 0.8rem; margin-bottom: 20px; text-align: center; display: none; }
        .modal { display: none; position: fixed; top:0; left:0; right:0; bottom:0; background: rgba(0,0,0,0.5); justify-content: center; align-items: center; z-index:1000; }
        .modal.active { display: flex; }
        .modal-content { background: white; border-radius: 32px; padding: 24px; max-width: 90%; width: 400px; }
        .modal-content h3 { margin-bottom: 16px; }
        .modal-content p { margin-bottom: 12px; line-height: 1.5; }
        .close-modal { background: #3B82F6; color: white; border: none; padding: 10px 20px; border-radius: 40px; cursor: pointer; margin-top: 16px; }
    </style>
</head>
<body>
<div class="card">
    <div class="logo">🌊 东海校园圈</div>
    <div class="sub">登录你的账号</div>
    <div id="errorMsg" class="error-msg"></div>
    <div class="input-group">
        <label class="input-label">用户名</label>
        <input type="text" id="username" class="input-field" placeholder="用户名">
    </div>
    <div class="input-group">
        <label class="input-label">密码</label>
        <input type="password" id="password" class="input-field" placeholder="密码">
    </div>
    <div class="checkbox-group">
        <input type="checkbox" id="agreeCheckbox" checked>
        <label>我已阅读并同意 <a id="showAgreementLink">《用户协议》</a></label>
    </div>
    <button class="btn btn-primary" onclick="login()">登录</button>
    <button class="btn btn-outline" onclick="location.href='register.html'">注册新账号</button>
</div>

<div id="agreementModal" class="modal">
    <div class="modal-content">
        <h3>用户协议</h3>
        <p>欢迎使用东海校园圈。本协议是您与东海校园圈之间的法律协议。</p>
        <p>1. 服务内容：东海校园圈提供校园社交、信息分享、聊天等功能。</p>
        <p>2. 用户行为规范：您不得发布违法、侵权、色情、暴力等内容；不得恶意攻击他人。</p>
        <p>3. 账号安全：您需妥善保管账号密码，因个人原因导致的损失由您自行承担。</p>
        <p>4. 隐私保护：我们会保护您的个人信息，不向第三方出售或泄露。</p>
        <p>5. 违约责任：违反协议将可能导致账号被封禁。</p>
        <p>6. 协议修改：我们有权修改协议，修改后会在平台公示。</p>
        <p>如您同意本协议，请勾选并继续。</p>
        <button class="close-modal" id="closeAgreementBtn">关闭</button>
    </div>
</div>

<script>
    const API_BASE = 'http://localhost:5000/api';
    const showAgreementLink = document.getElementById('showAgreementLink');
    const agreementModal = document.getElementById('agreementModal');
    const closeAgreementBtn = document.getElementById('closeAgreementBtn');
    showAgreementLink.onclick = () => agreementModal.classList.add('active');
    closeAgreementBtn.onclick = () => agreementModal.classList.remove('active');
    agreementModal.onclick = (e) => { if(e.target === agreementModal) agreementModal.classList.remove('active'); };

    async function login() {
        const username = document.getElementById('username').value.trim();
        const password = document.getElementById('password').value;
        const agree = document.getElementById('agreeCheckbox').checked;
        const errorDiv = document.getElementById('errorMsg');
        if (!username || !password) {
            errorDiv.textContent = '请填写用户名和密码';
            errorDiv.style.display = 'block';
            setTimeout(() => errorDiv.style.display = 'none', 3000);
            return;
        }
        if (!agree) {
            errorDiv.textContent = '请阅读并同意用户协议';
            errorDiv.style.display = 'block';
            setTimeout(() => errorDiv.style.display = 'none', 3000);
            return;
        }
        try {
            const res = await fetch(`${API_BASE}/login`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            });
            const data = await res.json();
            if (data.success) {
                localStorage.setItem('userId', data.user.id);
                localStorage.setItem('user', JSON.stringify(data.user));
                // 假设后端返回 role 字段（admin/user）
                window.location.href = 'index.html';
            } else {
                errorDiv.textContent = data.message || '用户名或密码错误';
                errorDiv.style.display = 'block';
                setTimeout(() => errorDiv.style.display = 'none', 3000);
            }
        } catch (err) {
            errorDiv.textContent = '网络错误，请确保后端已启动';
            errorDiv.style.display = 'block';
            setTimeout(() => errorDiv.style.display = 'none', 3000);
        }
    }
</script>
</body>
</html>
