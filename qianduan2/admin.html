<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>管理后台 · 东海校园论坛</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #F5F7FA; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif; }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
        h1 { font-size: 1.5rem; }
        .back-btn { background: white; border: 1px solid #E5E7EB; padding: 6px 16px; border-radius: 40px; cursor: pointer; }
        .nav-tabs { display: flex; gap: 12px; border-bottom: 1px solid #E5E7EB; margin-bottom: 24px; }
        .tab { padding: 10px 20px; cursor: pointer; color: #6B7280; }
        .tab.active { color: #3B82F6; border-bottom: 2px solid #3B82F6; }
        .stats-grid { display: flex; gap: 20px; margin-bottom: 30px; flex-wrap: wrap; }
        .stat-card { background: white; border-radius: 24px; padding: 20px; flex: 1; min-width: 150px; text-align: center; border: 1px solid #E5E7EB; }
        .stat-num { font-size: 2rem; font-weight: 700; color: #3B82F6; }
        table { width: 100%; background: white; border-radius: 24px; border-collapse: collapse; overflow: hidden; }
        th, td { padding: 12px 16px; text-align: left; border-bottom: 1px solid #E5E7EB; }
        th { background: #F9FAFB; font-weight: 600; }
        .btn { background: #F3F4F6; border: none; padding: 4px 12px; border-radius: 20px; cursor: pointer; margin: 0 4px; }
        .btn-danger { background: #FEF2F2; color: #EF4444; }
        .btn-warning { background: #FFFBEB; color: #F59E0B; }
        .modal { display: none; position: fixed; top:0; left:0; right:0; bottom:0; background: rgba(0,0,0,0.5); justify-content: center; align-items: center; z-index:1000; }
        .modal.active { display: flex; }
        .modal-content { background: white; border-radius: 32px; width: 90%; max-width: 500px; padding: 24px; }
        .modal-buttons { display: flex; gap: 12px; justify-content: flex-end; margin-top: 20px; }
        .report-detail { margin-top: 12px; font-size: 0.85rem; color: #6B7280; }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>管理后台</h1>
        <button class="back-btn" onclick="location.href='index.html'">返回首页</button>
    </div>
    <div class="nav-tabs">
        <div class="tab active" data-tab="dashboard">仪表盘</div>
        <div class="tab" data-tab="users">用户管理</div>
        <div class="tab" data-tab="posts">帖子管理</div>
        <div class="tab" data-tab="reports">举报管理</div>
    </div>
    <div id="tabContent"></div>
</div>

<div id="reasonModal" class="modal">
    <div class="modal-content">
        <h3>举报详情</h3>
        <div id="reasonDetail"></div>
        <div class="modal-buttons"><button class="btn" onclick="closeReasonModal()">关闭</button></div>
    </div>
</div>

<script>
    const API_BASE = 'http://localhost:5000/api';
    let currentUserId = null;
    let currentUser = null;

    async function apiRequest(url, options = {}) {
        const headers = { 'Content-Type': 'application/json', ...options.headers };
        if (currentUserId) headers['X-User-Id'] = currentUserId;
        const res = await fetch(API_BASE + url, { ...options, headers });
        if (!res.ok) throw new Error(await res.text());
        return res.json();
    }

    async function checkAdmin() {
        const uid = localStorage.getItem('userId');
        const userStr = localStorage.getItem('user');
        if (!uid || !userStr) { location.href = 'login.html'; return false; }
        currentUserId = parseInt(uid);
        currentUser = JSON.parse(userStr);
        if (currentUser.role !== 'admin') {
            alert('无权限访问');
            location.href = 'index.html';
            return false;
        }
        return true;
    }

    async function fetchStats() {
        const stats = await apiRequest('/admin/stats'); // 假设后端提供 /admin/stats
        return stats;
    }

    async function fetchUsers() {
        return await apiRequest('/admin/users');
    }

    async function fetchPosts() {
        return await apiRequest('/admin/posts');
    }

    async function fetchReports() {
        return await apiRequest('/admin/reports');
    }

    async function deleteUser(userId) {
        if (confirm('确定要删除该用户吗？')) {
            await apiRequest(`/admin/users/${userId}`, { method: 'DELETE' });
            alert('已删除');
            renderTab('users');
        }
    }

    async function deletePost(postId) {
        if (confirm('确定删除该帖子？')) {
            await apiRequest(`/admin/posts/${postId}`, { method: 'DELETE' });
            renderTab('posts');
        }
    }

    async function resolveReport(reportId) {
        await apiRequest(`/admin/reports/${reportId}`, { method: 'POST', body: JSON.stringify({ action: 'resolve' }) });
        renderTab('reports');
    }

    function renderDashboard() {
        fetchStats().then(stats => {
            let html = `<div class="stats-grid">
                <div class="stat-card"><div class="stat-num">${stats.userCount || 0}</div><div>用户总数</div></div>
                <div class="stat-card"><div class="stat-num">${stats.postCount || 0}</div><div>帖子总数</div></div>
                <div class="stat-card"><div class="stat-num">${stats.commentCount || 0}</div><div>评论总数</div></div>
                <div class="stat-card"><div class="stat-num">${stats.reportCount || 0}</div><div>待处理举报</div></div>
            </div>`;
            document.getElementById('tabContent').innerHTML = html;
        }).catch(() => {
            document.getElementById('tabContent').innerHTML = '<div>加载失败，请确保后端已实现相关接口</div>';
        });
    }

    function renderUsers() {
        fetchUsers().then(users => {
            let html = '<table><thead><tr><th>ID</th><th>用户名</th><th>昵称</th><th>角色</th><th>操作</th></tr></thead><tbody>';
            users.forEach(u => {
                html += `<tr>
                    <td>${u.id}</td>
                    <td>${escapeHtml(u.username)}</td>
                    <td>${escapeHtml(u.nickname)}</td>
                    <td>${u.role || 'user'}</td>
                    <td><button class="btn btn-danger" onclick="deleteUser(${u.id})">删除</button></td>
                </tr>`;
            });
            html += '</tbody></table>';
            document.getElementById('tabContent').innerHTML = html;
        });
    }

    function renderPosts() {
        fetchPosts().then(posts => {
            let html = '<table><thead><tr><th>ID</th><th>标题</th><th>作者</th><th>时间</th><th>操作</th></tr></thead><tbody>';
            posts.forEach(p => {
                html += `<tr>
                    <td>${p.id}</td>
                    <td>${escapeHtml(p.title)}</td>
                    <td>${escapeHtml(p.username)}</td>
                    <td>${p.created_at}</td>
                    <td><button class="btn btn-danger" onclick="deletePost(${p.id})">删除</button></td>
                </tr>`;
            });
            html += '</tbody></table>';
            document.getElementById('tabContent').innerHTML = html;
        });
    }

    function renderReports() {
        fetchReports().then(reports => {
            let html = '<table><thead><tr><th>ID</th><th>举报类型</th><th>目标ID</th><th>举报人</th><th>原因</th><th>操作</th></tr></thead><tbody>';
            reports.forEach(r => {
                html += `<tr>
                    <td>${r.id}</td>
                    <td>${r.target_type}</td>
                    <td>${r.target_id}</td>
                    <td>${escapeHtml(r.reporter_name)}</td>
                    <td><button class="btn" onclick="showReason('${escapeHtml(r.reason)}')">查看</button></td>
                    <td><button class="btn btn-warning" onclick="resolveReport(${r.id})">处理</button></td>
                </tr>`;
            });
            html += '</tbody></table>';
            document.getElementById('tabContent').innerHTML = html;
        });
    }

    function showReason(reason) {
        document.getElementById('reasonDetail').innerHTML = `<p><strong>举报原因：</strong><br>${reason}</p>`;
        document.getElementById('reasonModal').classList.add('active');
    }
    function closeReasonModal() { document.getElementById('reasonModal').classList.remove('active'); }

    function escapeHtml(s) { if(!s) return ""; return s.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[m])); }

    function renderTab(tab) {
        if (tab === 'dashboard') renderDashboard();
        else if (tab === 'users') renderUsers();
        else if (tab === 'posts') renderPosts();
        else if (tab === 'reports') renderReports();
    }

    async function init() {
        if (!await checkAdmin()) return;
        document.querySelectorAll('.tab').forEach(t => {
            t.onclick = () => {
                document.querySelectorAll('.tab').forEach(tt => tt.classList.remove('active'));
                t.classList.add('active');
                renderTab(t.dataset.tab);
            };
        });
        renderTab('dashboard');
        window.deleteUser = deleteUser;
        window.deletePost = deletePost;
        window.resolveReport = resolveReport;
        window.showReason = showReason;
        window.closeReasonModal = closeReasonModal;
    }
    init();
</script>
</body>
</html>
